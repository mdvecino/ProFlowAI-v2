version: "3.9"

services:
  db:
    image: postgres:16
    container_name: proflowai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: proflowai
      POSTGRES_USER: proflowai_user
      POSTGRES_PASSWORD: proflowai_password
    ports:
      - "5432:5432"
    volumes:
      - proflowai_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    container_name: proflowai_api
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./apps/api:/app

volumes:
  proflowai_postgres_data:
